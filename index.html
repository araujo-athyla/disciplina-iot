<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Disciplia Extensiva IoT</title>
     <link rel="stylesheet" href="fundo.css">
</head>
<body>

    <h2>Realizar a média da disciplina</h2>
    
    <!-- Solicitando as notas -->
    Nota 1: <input type="number" id="nota1"><br><br>
    Nota 2: <input type="number" id="nota2"><br><br>

    <!-- Botão que chama a função javascript e calcula a média -->
    <button onclick="calcular()">Calcular Média</button>

    <!-- Exibe a média -->
    <h3 id="resultado"></h3>

    <script>
        // Função que faz o cálculo quando o botão é clicado
        function calcular() {
            // conversão para números
            let n1 = Number(document.getElementById("nota1").value);
            let n2 = Number(document.getElementById("nota2").value);

            // calcula a média aritmética simples
            let media = (n1 + n2) / 2;

            // mostra o resultado final dentro do h3 na tela
            document.getElementById("resultado").innerHTML = "A média é: " + media;
        }
    </script>

</body>
</html>
